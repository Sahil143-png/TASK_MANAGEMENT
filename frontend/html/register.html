<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Register</title>

    <link rel="stylesheet" href="css/auth.css">

</head>


<body>


    <!-- Register Container -->

    <main class="auth-container">


        <!-- Register Card -->

        <div class="auth-card">


            <!-- Logo -->

            <div class="logo">
                <span>Task</span>Flow
            </div>



            <h1>
                Create Account
            </h1>


            <p class="subtitle">
                Start managing your tasks efficiently
            </p>




            <!-- Register Form -->

            <form id="registerForm">


                <!-- Full Name -->

                <div class="form-group">

                    <label for="name">
                        Full Name
                    </label>


                    <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>

                </div>




                <!-- Email -->

                <div class="form-group">


                    <label for="email">
                        Email
                    </label>


                    <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>


                </div>




                <!-- Password -->

                <div class="form-group">


                    <label for="password">
                        Password
                    </label>


                    <input
                    type="password"
                    id="password"
                    placeholder="Create password"
                    required>


                </div>




                <!-- Confirm Password -->

                <div class="form-group">


                    <label for="confirmPassword">
                        Confirm Password
                    </label>


                    <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    required>


                </div>




                <!-- Terms -->


                <div class="form-options">


                    <label>

                        <input type="checkbox" required>

                        I agree to Terms & Conditions

                    </label>


                </div>





                <!-- Register Button -->


                <button type="submit">

                    Create Account

                </button>




            </form>




            <!-- Login Link -->


            <p class="signup-link">

                Already have an account?

                <a href="login.html">
                    Login
                </a>


            </p>




        </div>


    </main>



</body>

</html>

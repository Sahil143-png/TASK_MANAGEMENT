<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>


<body>


<!-- ================= NAVBAR ================= -->

<header class="navbar">


    <div class="logo">
        <span>Task</span>Flow
    </div>



    <nav>

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="profile.html">
            Profile
        </a>


        <button id="logoutBtn">
            Logout
        </button>


    </nav>


</header>





<!-- ================= DASHBOARD ================= -->


<main class="dashboard-container">


    <!-- Welcome Section -->

    <section class="welcome">


        <div>

            <h1>
                Welcome Back, User 👋
            </h1>


            <p>
                Manage your tasks and boost your productivity.
            </p>


        </div>



        <a href="create-task.html" class="add-task-btn">

            + Add New Task

        </a>



    </section>





    <!-- Statistics Cards -->


    <section class="stats">


        <div class="stat-card">

            <h3>
                Total Tasks
            </h3>

            <p id="totalTasks">
                0
            </p>

        </div>




        <div class="stat-card">

            <h3>
                Completed
            </h3>

            <p id="completedTasks">
                0
            </p>

        </div>




        <div class="stat-card">

            <h3>
                Pending
            </h3>

            <p id="pendingTasks">
                0
            </p>

        </div>



        <div class="stat-card">

            <h3>
                In Progress
            </h3>

            <p id="progressTasks">
                0
            </p>

        </div>


    </section>







    <!-- Task Controls -->


    <section class="task-controls">


        <input 
        type="text"
        id="searchTask"
        placeholder="Search tasks...">



        <select id="filterStatus">

            <option value="">
                All Status
            </option>

            <option value="pending">
                Pending
            </option>

            <option value="in-progress">
                In Progress
            </option>

            <option value="completed">
                Completed
            </option>


        </select>




        <select id="sortTask">


            <option value="">
                Sort By
            </option>

            <option value="newest">
                Newest
            </option>

            <option value="oldest">
                Oldest
            </option>

            <option value="priority">
                Priority
            </option>


        </select>



    </section>







    <!-- Tasks Container -->


    <section class="tasks-section">


        <h2>
            My Tasks
        </h2>



        <div id="taskContainer" class="task-container">



            <!-- Task Card Example -->


            <div class="task-card">


                <div class="task-header">


                    <h3>
                        Complete Backend API
                    </h3>


                    <span class="priority high">
                        High
                    </span>


                </div>




                <p>
                    Create authentication and CRUD APIs using Express.js.
                </p>




                <div class="task-footer">


                    <span class="status pending">
                        Pending
                    </span>



                    <div>

                        <a href="edit-task.html">
                            Edit
                        </a>


                        <button class="delete-btn">
                            Delete
                        </button>


                    </div>


                </div>



            </div>



        </div>



    </section>



</main>





<script src="js/dashboard.js"></script>


</body>

</html>

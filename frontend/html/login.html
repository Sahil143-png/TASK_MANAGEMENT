<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Login</title>

    <link rel="stylesheet" href="css/auth.css">

</head>


<body>


    <!-- Login Container -->

    <main class="auth-container">


        <!-- Login Card -->

        <div class="auth-card">


            <!-- Logo -->

            <div class="logo">
                <span>Task</span>Flow
            </div>


            <h1>
                Welcome Back
            </h1>


            <p class="subtitle">
                Login to continue managing your tasks
            </p>



            <!-- Login Form -->

            <form id="loginForm">


                <!-- Email -->

                <div class="form-group">

                    <label for="email">
                        Email
                    </label>


                    <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

                </div>




                <!-- Password -->

                <div class="form-group">


                    <label for="password">
                        Password
                    </label>


                    <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>


                </div>




                <!-- Remember & Forgot Password -->


                <div class="form-options">


                    <label>

                        <input type="checkbox">

                        Remember me

                    </label>


                    <a href="#">
                        Forgot Password?
                    </a>


                </div>




                <!-- Login Button -->


                <button type="submit">

                    Login

                </button>


            </form>




            <!-- Register Link -->


            <p class="signup-link">

                Don't have an account?

                <a href="register.html">
                    Sign Up
                </a>

            </p>



        </div>


    </main>



</body>

</html>

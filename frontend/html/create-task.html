<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Create Task</title>

    <link rel="stylesheet" href="css/task.css">

</head>


<body>


<!-- ================= NAVBAR ================= -->

<header class="navbar">


    <div class="logo">
        <span>Task</span>Flow
    </div>


    <nav>

        <a href="dashboard.html">
            Dashboard
        </a>


        <a href="profile.html">
            Profile
        </a>


        <button id="logoutBtn">
            Logout
        </button>


    </nav>


</header>





<!-- ================= CREATE TASK ================= -->


<main class="task-page">


    <section class="task-card-form">


        <h1>
            Create New Task
        </h1>


        <p>
            Add a new task and keep your workflow organized.
        </p>




        <!-- Task Form -->


        <form id="createTaskForm">


            <!-- Title -->

            <div class="form-group">


                <label for="title">
                    Task Title
                </label>


                <input

                type="text"

                id="title"

                name="title"

                placeholder="Enter task title"

                required>


            </div>





            <!-- Description -->


            <div class="form-group">


                <label for="description">
                    Description
                </label>


                <textarea

                id="description"

                name="description"

                rows="5"

                placeholder="Describe your task">

                </textarea>


            </div>






            <!-- Priority -->


            <div class="form-row">


                <div class="form-group">


                    <label for="priority">
                        Priority
                    </label>


                    <select id="priority" name="priority">


                        <option value="">
                            Select Priority
                        </option>


                        <option value="low">
                            Low
                        </option>


                        <option value="medium">
                            Medium
                        </option>


                        <option value="high">
                            High
                        </option>


                    </select>


                </div>







                <!-- Status -->


                <div class="form-group">


                    <label for="status">
                        Status
                    </label>


                    <select id="status" name="status">


                        <option value="pending">
                            Pending
                        </option>


                        <option value="in-progress">
                            In Progress
                        </option>


                        <option value="completed">
                            Completed
                        </option>


                    </select>


                </div>



            </div>







            <!-- Due Date -->


            <div class="form-group">


                <label for="dueDate">
                    Due Date
                </label>


                <input

                type="date"

                id="dueDate"

                name="dueDate">


            </div>







            <!-- Buttons -->


            <div class="form-actions">


                <a href="dashboard.html" class="cancel-btn">

                    Cancel

                </a>



                <button type="submit" class="save-btn">

                    Create Task

                </button>



            </div>




        </form>



    </section>


</main>





<script src="js/create-task.js"></script>


</body>

</html>
